<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Music Game</title>
<style>
body{font-family:Arial;background:#111;color:white;text-align:center}
img{max-width:160px}
</style>
</head>

<body>

<h1>Western Music History Quest</h1>
<button onclick="startGame()">Start quest</button>

<div id="game"></div>

<script>
const figaro = "data:image/jpeg;base64,{{FIGARO_BASE64}}";
const devil = "data:image/jpeg;base64,{{DEVIL_BASE64}}";

let q=0;

const questions=[
{q:"Which style is light and elegant?",a:["Empfindsam","Galant","Romantic"],c:1},
{q:"Pergolesi work type?",a:["Opera","Intermezzo","Symphony"],c:1},
{q:"Mozart singspiel?",a:["Don Giovanni","Magic Flute","Figaro"],c:1}
];

function startGame(){
q=0;
showQ();
}

function showQ(){
let html = `
<img src="${figaro}">
<h2>${questions[q].q}</h2>
`;

questions[q].a.forEach((ans,i)=>{
html+=`<button onclick="check(${i})">${ans}</button><br><br>`;
});

document.getElementById("game").innerHTML=html;
}

function check(i){
if(i===questions[q].c){
q++;
if(q>=questions.length){
document.getElementById("game").innerHTML=`
<img src="${figaro}">
<h2>YOU WIN 🎉</h2>`;
}else{
showQ();
}
}else{
document.getElementById("game").innerHTML=`
<img src="${devil}">
<h2>Wrong! Back to start.</h2>`;
setTimeout(startGame,1500);
}
}
</script>

</body>
</html>
